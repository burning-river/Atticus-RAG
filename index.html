<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simplified RAG App</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f9; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; }
        .step-card { background: white; width: 400px; padding: 20px; margin-bottom: 15px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .chat-box { height: 200px; overflow-y: auto; border: 1px solid #ddd; padding: 10px; margin-bottom: 10px; background: #fafafa; border-radius: 4px; display: flex; flex-direction: column; gap: 8px; }
        .message { padding: 8px; border-radius: 6px; max-width: 80%; word-wrap: break-word; }
        .user { background: #0078d4; color: white; align-self: flex-end; }
        .bot { background: #e1e1e1; color: #333; align-self: flex-start; }
        .input-row { display: flex; gap: 5px; }
        input[type="text"] { flex: 1; padding: 8px; border: 1px solid #ddd; border-radius: 4px; outline: none; }
        button { background: #0078d4; color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; }
        button:hover { background: #005a9e; }
        .status { font-size: 12px; margin-top: 5px; font-weight: bold; }
        .success { color: green; } .error { color: red; }
    </style>
</head>
<body>

    <!-- STEP 1: PDF UPLOAD -->
    <div class="step-card" id="uploadCard">
        <h3>Step 1: Upload Document</h3>
        <div class="input-row">
            <input type="file" id="pdfFile" accept=".pdf">
            <button type="button" onclick="uploadPDF(event)">Upload</button>
        </div>
        <div id="uploadStatus" class="status"></div>
    </div>

    <!-- STEP 2: RAG QUERY -->
    <div class="step-card" id="queryCard">
        <h3>Step 2: Query Document</h3>
        <div class="chat-box" id="chatBox">
            <div class="message bot">Upload a PDF above, then ask your questions here!</div>
        </div>
        <div class="input-row">
            <input type="text" id="queryInput" placeholder="Ask something..." onkeypress="if(event.key === 'Enter') sendQuery()">
            <button type="button" onclick="sendQuery(event)">Ask</button>
        </div>
    </div>

<script>
    // ⚠️ Pointing directly to your local FastAPI Uvicorn Instance
    const BASE_URL = "https://o10a2xelccuda32qke6fx364.77.42.126.14.sslip.io"; 
    
    // State variable to track the document file name reference
    // 💡 FIXED: Read from sessionStorage. If the page reloads, your filename stays safe!
    let serverFilename = sessionStorage.getItem("saved_rag_filename") || "";

    // Automatically check if a file was already uploaded when the page loads
    window.onload = function() {
        if (serverFilename) {
            const statusDiv = document.getElementById("uploadStatus");
            statusDiv.className = "status success";
            statusDiv.innerText = `✓ Restored session: ${serverFilename} is active.`;
            document.getElementById("pdfFile").disabled = true;
        }
    };

    // 1. UPLOAD PDF
    async function uploadPDF(event) {
        if(event) event.preventDefault();
        const fileInput = document.getElementById("pdfFile");
        const statusDiv = document.getElementById("uploadStatus");
        if(fileInput.files.length === 0) return alert("Please select a PDF file first.");

        const formData = new FormData();
        formData.append("file", fileInput.files[0]);

        statusDiv.className = "status";
        statusDiv.innerText = "Uploading file to server...";

        try {
            const response = await fetch(`${BASE_URL}/api/upload`, { 
                method: "POST", 
                body: formData // No custom authorization headers are attached here anymore
            });
            const data = await response.json();
            
            if(response.ok) {
                serverFilename = data.filename; 
                sessionStorage.setItem("saved_rag_filename", serverFilename);
                statusDiv.className = "status success";
                statusDiv.innerText = `✓ ${serverFilename} successfully saved on local storage.`;
                fileInput.disabled = true;
            } else {
                statusDiv.className = "status error";
                statusDiv.innerText = `✗ Upload failed: ${data.detail || 'Processing error'}`;
            }
        } catch (err) {
            statusDiv.className = "status error";
            statusDiv.innerText = "Server connection failure during document transmission.";
            console.error(err);
        }
    }

    // 2. SEND QUERY
    async function sendQuery(event) {
        if(event) event.preventDefault();
        const queryInput = document.getElementById("queryInput");
        const queryText = queryInput.value.trim();
        
        if(!serverFilename) {
            return alert("Please upload a PDF file in Step 1 before querying.");
        }
        if(!queryText) return;

        // Immediately show user question in chat box
        appendMessage(queryText, "user");
        queryInput.value = "";
        
        // Spawn a blank bot bubble to absorb incoming streaming text tokens
        const botBubble = appendMessage("", "bot");
        botBubble.innerHTML = "<em>Invoking RAG pipeline model...</em>";

        const formData = new FormData();
        formData.append("filename", serverFilename);
        formData.append("query", queryText);

        try {
            const response = await fetch(`${BASE_URL}/api/query`, { 
                method: "POST", 
                body: formData 
            });

            if (!response.ok) {
                const errData = await response.json();
                botBubble.innerText = `Error (${response.status}): ${JSON.stringify(errData.detail || errData)}`;
                return;
            }

            // Evaporate the initialization string once stream bytes unlock
            botBubble.innerText = "";

            // Hook reader to ingest token-by-token streaming values
            const reader = response.body.getReader();
            const decoder = new TextDecoder("utf-8");

            while (true) {
                const { value, done } = await reader.read();
                if (done) break;
                
                const chunk = decoder.decode(value, { stream: true });
                botBubble.innerText += chunk;
                
                // Continuous automatic downward scroll lock
                const chatBox = document.getElementById("chatBox");
                chatBox.scrollTop = chatBox.scrollHeight;
            }
        } catch (err) {
            botBubble.innerText = "Network pipeline error pulling streaming response pipeline.";
            console.error(err);
        }
    }

    function appendMessage(text, sender) {
        const chatBox = document.getElementById("chatBox");
        const msgDiv = document.createElement("div");
        msgDiv.className = `message ${sender}`;
        msgDiv.innerText = text;
        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
        return msgDiv;
    }
</script>
</body>
</html>
